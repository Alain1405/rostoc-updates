name: Update Smoke Dispatch

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Windows architecture to smoke'
        required: false
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - i686
      previous_msi_url:
        description: 'Optional URL for the previously published Windows MSI. Leave blank to resolve from the backend public latest endpoint.'
        required: false
        default: ''
        type: string
      new_msi_url:
        description: 'URL for the freshly built Windows MSI'
        required: true
        type: string
      expected_new_version:
        description: 'Expected version after the update install'
        required: true
        type: string

jobs:
  update-smoke:
    runs-on: windows-latest
    env:
      PREVIOUS_MSI_URL: ${{ inputs.previous_msi_url }}
      NEW_MSI_URL: ${{ inputs.new_msi_url }}
      EXPECTED_NEW_VERSION: ${{ inputs.expected_new_version }}
      UPDATE_ARCH: ${{ inputs.arch }}
      IS_RELEASE: ${{ contains(inputs.new_msi_url, 'Rostoc-staging-') && 'false' || 'true' }}
      VARIANT: ${{ contains(inputs.new_msi_url, 'Rostoc-staging-') && 'staging' || 'production' }}
    steps:
      - name: Checkout repo (scripts + Loki helper)
        uses: actions/checkout@v4

      - name: Download MSI inputs and resolve baseline
        id: download-msi
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $logDir = Join-Path $env:RUNNER_TEMP 'update-smoke-dispatch'
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null

          # Preserve the canonical artifact basename so the smoke script can infer
          # the product name from filenames like Rostoc-0.2.197-windows-x64.msi.
          $newFileName = [System.IO.Path]::GetFileName(([uri]$env:NEW_MSI_URL).AbsolutePath)
          $newPath = Join-Path $logDir $newFileName

          Invoke-WebRequest -Uri $env:NEW_MSI_URL -OutFile $newPath

          $previousMsiUrl = $env:PREVIOUS_MSI_URL
          if ([string]::IsNullOrWhiteSpace($previousMsiUrl)) {
            $updateChannel = if ($env:VARIANT -eq 'staging') { 'staging' } else { 'stable' }
            $backendArchitecture = switch ($env:UPDATE_ARCH) {
              'x86_64' { 'x64' }
              'i686' { 'x86' }
              default { $env:UPDATE_ARCH }
            }
            # Resolve the baseline from the backend public latest endpoint so
            # dispatch-time smoke checks do not depend on Pages manifests.
            $backendLatestUrl = 'https://api.rostoc.co/api/updates/latest/public/'
            $latestReleaseUri = "${backendLatestUrl}?channel=$updateChannel"
            $latestRelease = Invoke-RestMethod -Uri $latestReleaseUri -Method Get
            $previousMsi = $latestRelease.platforms |
              Where-Object { $_.platform -eq 'windows' -and $_.architecture -eq $backendArchitecture } |
              Select-Object -First 1

            if (-not $previousMsi) {
              throw "Unable to resolve the previous Windows MSI from $backendLatestUrl for channel '$updateChannel' and architecture '$backendArchitecture'"
            }

            $backendOrigin = ([uri]$backendLatestUrl).GetLeftPart([System.UriPartial]::Authority)
            $previousMsiUrl = ([uri]::new([uri]$backendOrigin, $previousMsi.downloadUrl)).AbsoluteUri
          }

          "new_msi_path=$newPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "previous_msi_url=$previousMsiUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run Windows update smoke
        shell: pwsh
        env:
          NEW_MSI_PATH: ${{ steps.download-msi.outputs.new_msi_path }}
          PREVIOUS_MSI_URL: ${{ steps.download-msi.outputs.previous_msi_url }}
          EXPECTED_NEW_VERSION: ${{ env.EXPECTED_NEW_VERSION }}
        run: |
          $ErrorActionPreference = 'Stop'

          $logDir = Join-Path $env:RUNNER_TEMP 'update-smoke-dispatch'
          $stdoutLog = Join-Path $logDir 'summary.stdout.log'
          $newMsiPath = $env:NEW_MSI_PATH

          & "$env:GITHUB_WORKSPACE/scripts/ci/windows/update-smoke.ps1" `
            -NewMsiPath $newMsiPath `
            -PreviousMsiUrl $env:PREVIOUS_MSI_URL `
            -ExpectedNewVersion $env:EXPECTED_NEW_VERSION `
            -LogDir $logDir 2>&1 | Tee-Object -FilePath $stdoutLog

      - name: Upload update smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-smoke-logs-${{ github.run_id }}
          path: ${{ runner.temp }}\update-smoke-dispatch
          retention-days: 14
          if-no-files-found: warn

      - name: Ship update smoke logs to Loki
        if: always()
        continue-on-error: true
        shell: bash
        env:
          LOKI_URL: ${{ secrets.LOKI_URL }}
          LOKI_USERNAME: ${{ secrets.LOKI_USERNAME }}
          LOKI_PASSWORD: ${{ secrets.LOKI_PASSWORD }}
        run: |
          set -euo pipefail

          REPO_ROOT="$(cygpath -u "$GITHUB_WORKSPACE")"
          LOG_FILE="$(cygpath -u "$RUNNER_TEMP/update-smoke-dispatch/summary.stdout.log")"
          LABELS=$(cat <<EOF
          {
            "platform": "windows",
            "arch": "$UPDATE_ARCH",
            "variant": "$VARIANT",
            "job": "update_smoke",
            "status": "${{ job.status }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "actor": "${{ github.actor }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "is_release": "${{ env.IS_RELEASE }}"
          }
          EOF
          )

          "$REPO_ROOT/scripts/ci/ship_logs_to_loki.sh" "$LOG_FILE" "$LABELS"
