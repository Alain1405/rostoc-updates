name: Setup Status

on:
  workflow_call:
    outputs:
      resolved_commit_sha:
        description: 'Resolved commit SHA of the private repo target'
        value: ${{ jobs.set-status.outputs.resolved_commit_sha }}
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build from private repo'
        required: false
        type: string
        default: 'main'
      commit_sha:
        description: 'Commit SHA of the private repo (for stamping)'
        required: false
        type: string
      is_release:
        description: 'Whether to execute release publishing steps'
        required: true
        type: boolean

env:
  PRIVATE_REPO: Rostoc/rostoc
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8
  LC_CTYPE: en_US.UTF-8

jobs:
  set-status:
    runs-on: ubuntu-latest
    outputs:
      resolved_commit_sha: ${{ steps.explicit-target-sha.outputs.sha || steps.resolved-target-sha.outputs.sha || steps.empty-target-sha.outputs.sha }}
    env:
      STATUS_CONTEXT: ${{ inputs.is_release && 'rostoc-updates/release' || 'rostoc-updates/ci' }}
      STATUS_DESCRIPTION: ${{ inputs.is_release && 'Public release build running' || 'Public CI build running' }}
    steps:
      - name: Detect status token
        id: detect-status-token
        run: |
          if [ -n "${UPDATES_REPO_TOKEN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            # shellcheck disable=SC2016
            echo '### ℹ️ Status updates skipped' >> "$GITHUB_STEP_SUMMARY"
            # shellcheck disable=SC2016
            echo '\`UPDATES_REPO_TOKEN\` not provided; omitting private repo commit status.' >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          UPDATES_REPO_TOKEN: ${{ secrets.UPDATES_REPO_TOKEN }}

      - name: Use explicit commit SHA
        if: ${{ inputs.commit_sha != '' }}
        id: explicit-target-sha
        run: echo "sha=${INPUT_COMMIT_SHA}" >> "$GITHUB_OUTPUT"
        env:
          INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}

      - name: Resolve commit SHA from private ref
        if: ${{ inputs.commit_sha == '' && steps.detect-status-token.outputs.available == 'true' }}
        id: resolved-target-sha
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.UPDATES_REPO_TOKEN }}
          result-encoding: string
          script: |
            const [owner, repo] = process.env.PRIVATE_REPO.split('/');
            const ref = process.env.INPUT_REF || 'main';

            if (!owner || !repo) {
              core.warning(`Unable to parse PRIVATE_REPO env "${process.env.PRIVATE_REPO}"; leaving target SHA empty.`);
              core.setOutput('sha', '');
              return 'unresolved';
            }

            const { data } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref
            });

            core.setOutput('sha', data.sha);
            core.info(`Resolved ${owner}/${repo}@${ref} to ${data.sha}`);
            return data.sha;
        env:
          INPUT_REF: ${{ inputs.ref }}

      - name: Leave commit SHA empty
        if: ${{ inputs.commit_sha == '' && steps.detect-status-token.outputs.available != 'true' }}
        id: empty-target-sha
        run: |
          echo "sha=" >> "$GITHUB_OUTPUT"
          echo '### ℹ️ Commit SHA resolution skipped' >> "$GITHUB_STEP_SUMMARY"
          echo 'Manual dispatch did not include a commit SHA, and UPDATES_REPO_TOKEN is unavailable to resolve the private repo ref.' >> "$GITHUB_STEP_SUMMARY"

      - name: Set pending status in private repo
        if: ${{ (steps.explicit-target-sha.outputs.sha || steps.resolved-target-sha.outputs.sha || steps.empty-target-sha.outputs.sha) != '' && steps.detect-status-token.outputs.available == 'true' }}
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.explicit-target-sha.outputs.sha || steps.resolved-target-sha.outputs.sha || steps.empty-target-sha.outputs.sha }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.UPDATES_REPO_TOKEN }}
          result-encoding: string
          script: |
            const [owner, repo] = process.env.PRIVATE_REPO.split('/');
            const sha = process.env.TARGET_SHA;
            const statusContext = process.env.STATUS_CONTEXT;
            const description = process.env.STATUS_DESCRIPTION;
            const targetUrl = process.env.TARGET_URL;

            if (!owner || !repo) {
              core.warning(`Unable to parse PRIVATE_REPO env "${process.env.PRIVATE_REPO}"; skipping status update.`);
              return 'skipped';
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state: 'pending',
              context: statusContext,
              description,
              target_url: targetUrl
            });

            core.info(`Set pending status (${context}) on ${owner}/${repo}@${sha}`);
            return 'pending-set';
