name: Build & Publish (Orchestrator)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git reference to build (branch, tag, or commit SHA)'
        required: true
        type: string

  workflow_call:
    inputs:
      ref:
        required: true
        type: string
        description: 'Git reference to build'
      commit_sha:
        required: false
        type: string
        description: 'Commit SHA for status updates'
      is_release:
        required: false
        type: boolean
        default: false
        description: 'Whether this is a release build'
      release_channel:
        required: false
        type: string
        default: 'stable'
        description: 'Release channel (stable, beta, dev)'
      backend_publish_url:
        required: false
        type: string
        default: 'https://api.rostoc.co/api/updates/publish/'
        description: 'Backend API endpoint for release publishing'
      initiator:
        required: false
        type: string
        description: 'GitHub user who initiated the workflow'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

env:
  PRIVATE_REPO: Rostoc/rostoc

jobs:
  # Phase 1: Resolve target SHA and set pending status in the private repo.
  setup:
    uses: ./.github/workflows/setup.yml
    with:
      ref: ${{ inputs.ref }}
      commit_sha: ${{ inputs.commit_sha }}
      is_release: ${{ inputs.is_release || false }}
    secrets: inherit

  # Phase 2a: Run the private repo lint + smoke suite in parallel with the build.
  lint-and-tests:
    needs: setup
    uses: ./.github/workflows/lint-and-tests.yml
    with:
      ref: ${{ inputs.ref }}
    secrets: inherit

  # Phase 2b: Build desktop (matrix: macOS M1, Windows x64, + optional platforms)
  build:
    needs: setup
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ inputs.ref }}
      commit_sha: ${{ needs.setup.outputs.resolved_commit_sha }}
      is_release: ${{ inputs.is_release || false }}
    secrets: inherit

  # Phase 2.5: Windows update smoke gate.
  update-smoke-windows:
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repo (scripts + manifests)
        uses: actions/checkout@v4

      - name: Download Windows MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi-for-smoke-${{ github.run_id }}
          path: ${{ runner.temp }}\update-smoke\artifact

      - name: Run Windows update smoke
        shell: pwsh
        env:
          BASE_VERSION: ${{ needs.build.outputs.version }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          IS_RELEASE: ${{ inputs.is_release || false }}
          UPDATE_CHANNEL: 'stable'
          UPDATE_VARIANT: 'production'
          UPDATE_SMOKE_THRESHOLD_SECONDS: '90'
          UPDATE_SMOKE_BASELINE_SECONDS: '135'
        run: |
          $ErrorActionPreference = 'Stop'

          $repoRoot = $env:GITHUB_WORKSPACE
          $logDir = Join-Path $env:RUNNER_TEMP 'update-smoke'
          $artifactDir = Join-Path $env:RUNNER_TEMP 'update-smoke\artifact'
          $stdoutLog = Join-Path $logDir 'summary.stdout.log'

          New-Item -ItemType Directory -Path $logDir -Force | Out-Null

          $newMsi = Get-ChildItem -Path $artifactDir -Filter '*.msi' -Recurse | Select-Object -First 1
          if (-not $newMsi) {
            throw "Downloaded MSI artifact not found under $artifactDir"
          }

          $updateChannel = $env:UPDATE_CHANNEL
          $expectedNewVersion = if ($env:IS_RELEASE -eq 'true') {
            $env:BASE_VERSION
          } else {
            $runNumber = [int]$env:GITHUB_RUN_NUMBER
            $windowsVersionSegment = $runNumber % 65536
            # Windows Installer exposes the installed product version as a dotted
            # numeric string even though the dev stamp is derived from semver.
            "$($env:BASE_VERSION).$windowsVersionSegment"
          }

          # The smoke job always validates the production Windows MSI artifact.
          # Use the stable backend channel as the authoritative baseline so the
          # installed product name matches the production bundle under test.
          $backendLatestUrl = 'https://api.rostoc.co/api/updates/latest/public/'
          $latestReleaseUri = "${backendLatestUrl}?channel=$updateChannel"
          $latestRelease = Invoke-RestMethod -Uri $latestReleaseUri -Method Get
          $previousMsi = $latestRelease.platforms |
            Where-Object { $_.platform -eq 'windows' -and $_.architecture -eq 'x64' } |
            Select-Object -First 1

          if (-not $previousMsi) {
            throw "Unable to resolve the previous Windows x86_64 MSI from $backendLatestUrl for channel '$updateChannel'"
          }

          $backendOrigin = ([uri]$backendLatestUrl).GetLeftPart([System.UriPartial]::Authority)
          $previousMsiUrl = ([uri]::new([uri]$backendOrigin, $previousMsi.downloadUrl)).AbsoluteUri

          & "$repoRoot/scripts/ci/windows/update-smoke.ps1" `
            -NewMsiPath $newMsi.FullName `
            -PreviousMsiUrl $previousMsiUrl `
            -ExpectedNewVersion $expectedNewVersion `
            -LogDir $logDir 2>&1 | Tee-Object -FilePath $stdoutLog

      - name: Upload update smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-smoke-logs-${{ github.run_id }}
          path: |
            ${{ runner.temp }}\update-smoke\summary.json
            ${{ runner.temp }}\update-smoke\debug-state.json
            ${{ runner.temp }}\update-smoke\msi-action-timeline.json
            ${{ runner.temp }}\update-smoke\summary.stdout.log
            ${{ runner.temp }}\update-smoke\previous-install.log
            ${{ runner.temp }}\update-smoke\update-install.log
          retention-days: 14
          if-no-files-found: warn

      - name: Ship update smoke logs to Loki
        if: always()
        continue-on-error: true
        shell: bash
        env:
          LOKI_URL: ${{ secrets.LOKI_URL }}
          LOKI_USERNAME: ${{ secrets.LOKI_USERNAME }}
          LOKI_PASSWORD: ${{ secrets.LOKI_PASSWORD }}
          UPDATE_VARIANT: 'production'
        run: |
          set -euo pipefail

          REPO_ROOT="$(cygpath -u "$GITHUB_WORKSPACE")"
          LOG_FILE="$(cygpath -u "$RUNNER_TEMP/update-smoke/summary.stdout.log")"
          LABELS=$(cat <<EOF
          {
            "platform": "windows",
            "arch": "x86_64",
            "variant": "${UPDATE_VARIANT}",
            "job": "update_smoke",
            "status": "${{ job.status }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "actor": "${{ github.actor }}",
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "is_release": "${{ inputs.is_release || false }}"
          }
          EOF
          )

          "$REPO_ROOT/scripts/ci/ship_logs_to_loki.sh" "$LOG_FILE" "$LABELS"

      - name: Warn on slow update install
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          UPDATE_VARIANT: 'production'
          UPDATE_SMOKE_THRESHOLD_SECONDS: '90'
        run: |
          $summaryPath = Join-Path (Join-Path $env:RUNNER_TEMP 'update-smoke') 'summary.json'
          if (-not (Test-Path -LiteralPath $summaryPath)) {
            Write-Host '[WARN] summary.json missing; skipping threshold notification'
            exit 0
          }

          $summary = Get-Content -LiteralPath $summaryPath -Raw | ConvertFrom-Json
          if ($summary.status -ne 'success') {
            Write-Host "[INFO] update smoke status is '$($summary.status)'; skipping threshold notification"
            exit 0
          }

          if ($null -eq $summary.update_install_seconds) {
            Write-Host '[WARN] update_install_seconds missing; skipping threshold notification'
            exit 0
          }

          $seconds = [double]$summary.update_install_seconds
          $threshold = [double]$env:UPDATE_SMOKE_THRESHOLD_SECONDS

          if ($seconds -le $threshold) {
            Write-Host "[INFO] update_install_seconds=$seconds is within threshold $threshold"
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:SLACK_WEBHOOK_URL)) {
            Write-Host '[WARN] SLACK_WEBHOOK_URL is not set; skipping threshold notification'
            exit 0
          }

          $payload = @{
            text = "⚠️ Rostoc Windows update smoke exceeded $threshold seconds"
            blocks = @(
              @{
                type = 'header'
                text = @{ type = 'plain_text'; text = '⚠️ Slow Windows update smoke' }
              },
              @{
                type = 'section'
                fields = @(
                  @{ type = 'mrkdwn'; text = "*Update install seconds:* $seconds" },
                  @{ type = 'mrkdwn'; text = "*Threshold:* $threshold" },
                  @{ type = 'mrkdwn'; text = "*Run:* ${{ github.run_id }}" },
                  @{ type = 'mrkdwn'; text = "*Variant:* $env:UPDATE_VARIANT" }
                )
              }
            )
          } | ConvertTo-Json -Depth 6

          Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $payload | Out-Null

      - name: Warn on update install regression
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          UPDATE_SMOKE_BASELINE_SECONDS: '135'
        run: |
          $summaryPath = Join-Path (Join-Path $env:RUNNER_TEMP 'update-smoke') 'summary.json'
          if (-not (Test-Path -LiteralPath $summaryPath)) {
            Write-Host '[WARN] summary.json missing; skipping regression notification'
            exit 0
          }

          $summary = Get-Content -LiteralPath $summaryPath -Raw | ConvertFrom-Json
          if ($summary.status -ne 'success') {
            Write-Host "[INFO] update smoke status is '$($summary.status)'; skipping regression notification"
            exit 0
          }

          if ($null -eq $summary.update_install_seconds) {
            Write-Host '[WARN] update_install_seconds missing; skipping regression notification'
            exit 0
          }

          $seconds = [double]$summary.update_install_seconds
          $baseline = [double]$env:UPDATE_SMOKE_BASELINE_SECONDS
          $regressionThreshold = $baseline * 1.5

          if ($seconds -le $regressionThreshold) {
            Write-Host "[INFO] update_install_seconds=$seconds is within regression threshold $regressionThreshold"
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:SLACK_WEBHOOK_URL)) {
            Write-Host '[WARN] SLACK_WEBHOOK_URL is not set; skipping regression notification'
            exit 0
          }

          $payload = @{
            text = "🚨 Rostoc Windows update smoke regressed beyond the baseline"
            blocks = @(
              @{
                type = 'header'
                text = @{ type = 'plain_text'; text = '🚨 Windows update smoke regression' }
              },
              @{
                type = 'section'
                fields = @(
                  @{ type = 'mrkdwn'; text = "*Update install seconds:* $seconds" },
                  @{ type = 'mrkdwn'; text = "*Baseline:* $baseline seconds" },
                  @{ type = 'mrkdwn'; text = "*Regression threshold:* $regressionThreshold seconds" }
                )
              }
            )
          } | ConvertTo-Json -Depth 6

          Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $payload | Out-Null

  # Phase 3a: Publish production channel
  publish-production:
    if: ${{ always() && inputs.is_release && needs.lint-and-tests.result == 'success' && needs.build.result == 'success' && needs.update-smoke-windows.result == 'success' }}
    needs: [setup, lint-and-tests, build, update-smoke-windows]
    uses: ./.github/workflows/publish.yml
    with:
      ref: ${{ inputs.ref }}
      commit_sha: ${{ needs.setup.outputs.resolved_commit_sha }}
      is_release: true
      release_channel: 'stable'
      backend_publish_url: ${{ inputs.backend_publish_url || 'https://api.rostoc.co/api/updates/publish/' }}
    secrets: inherit

  # Phase 3b: Publish staging channel
  publish-staging:
    if: ${{ always() && inputs.is_release && needs.lint-and-tests.result == 'success' && needs.build.result == 'success' && needs.update-smoke-windows.result == 'success' }}
    needs: [setup, lint-and-tests, build, update-smoke-windows]
    uses: ./.github/workflows/publish.yml
    with:
      ref: ${{ inputs.ref }}
      commit_sha: ${{ needs.setup.outputs.resolved_commit_sha }}
      is_release: true
      release_channel: 'staging'
      backend_publish_url: ${{ inputs.backend_publish_url || 'https://api.rostoc.co/api/updates/publish/' }}
    secrets: inherit

  # Phase 4: Finalize (update commit status)
  finalize:
    if: always()
    needs:
      [
        setup,
        lint-and-tests,
        build,
        update-smoke-windows,
        publish-production,
        publish-staging,
      ]
    uses: ./.github/workflows/finalize.yml
    with:
      commit_sha: ${{ needs.setup.outputs.resolved_commit_sha }}
      is_release: ${{ inputs.is_release || false }}
      build_result: ${{ (needs.lint-and-tests.result == 'success' && needs.build.result == 'success' && needs.update-smoke-windows.result == 'success' && (needs.publish-production.result == 'success' || needs.publish-production.result == 'skipped') && (needs.publish-staging.result == 'success' || needs.publish-staging.result == 'skipped')) && 'success' || 'failure' }}
    secrets: inherit
