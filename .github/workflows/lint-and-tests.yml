name: Lint and Tests

on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build from private repo'
        required: false
        type: string
        default: 'main'

env:
  PRIVATE_REPO: Rostoc/rostoc
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8
  LC_CTYPE: en_US.UTF-8

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout updates repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH agent for private repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRIVATE_REPO_SSH_KEY }}

      - name: Add GitHub to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Checkout private repo (read-only)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ inputs.ref }}
          ssh-key: ${{ secrets.PRIVATE_REPO_SSH_KEY }}
          path: private-src
          fetch-depth: 0

      - name: Run public repo reference hygiene scan
        shell: bash
        run: |
          set -euo pipefail
          python3 private-src/scripts/reference_hygiene.py \
            --path . \
            --commits \
            --commit-count 25 \
            --strict \
            --output-dir .artifacts/reference-hygiene-public
          cat .artifacts/reference-hygiene-public/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload public reference hygiene summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-reference-hygiene-${{ github.run_id }}
          path: .artifacts/reference-hygiene-public
          retention-days: 14
          if-no-files-found: warn

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Derive pnpm store path
        id: verify-pnpm-store
        shell: bash
        run: |
          set -euo pipefail
          cd private-src
          echo "[INFO] pnpm version: $(pnpm --version || true)" >&2
          STORE_PATH=$(pnpm store path 2>/dev/null | tr -d '\r' || true)
          if [ -z "${STORE_PATH}" ]; then
            echo "[WARN] pnpm store path empty; falling back to default ~/.pnpm-store" >&2
            STORE_PATH="$HOME/.pnpm-store"
          fi
          mkdir -p "$STORE_PATH" || true
          echo "Using STORE_PATH=$STORE_PATH" >&2
          echo "STORE_PATH=$STORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Compute dependency hashes
        id: dependency-hashes
        shell: bash
        run: |
          scripts/ci/hash_lockfiles.sh private-src

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.verify-pnpm-store.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ steps.dependency-hashes.outputs.pnpm }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install uv (Python package manager)
        working-directory: private-src
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "UV_BIN=$HOME/.local/bin" >> "$GITHUB_ENV"

      - name: Cache Python wheels
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: python-wheel-${{ runner.os }}-${{ steps.dependency-hashes.outputs.uv }}
          restore-keys: |
            python-wheel-${{ runner.os }}-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Rust cache configuration
        working-directory: private-src
        shell: bash
        run: bash ../scripts/ci/inspect_rust_cache.sh pre

      - name: Cache Rust target
        id: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            private-src/src-tauri -> ../target
          shared-key: lint
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Report Rust cache restore result
        working-directory: private-src
        shell: bash
        env:
          RUST_CACHE_HIT: ${{ steps.rust-cache.outputs.cache-hit || 'false' }}
        run: bash ../scripts/ci/inspect_rust_cache.sh post . "$RUST_CACHE_HIT"

      - name: Install JS dependencies
        working-directory: private-src
        run: pnpm install --frozen-lockfile

      - name: Run lint suite
        working-directory: private-src
        run: pnpm lint

      - name: Run smoke tests
        working-directory: private-src
        env:
          REQUIRE_ROSI: '0'
          ROSTOC_ROSI_DISABLED: '1'
        run: pnpm smoke
