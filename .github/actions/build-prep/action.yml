name: 'Build Prep (Checkout, SSH, Toolchains)'
description: 'Prepare build environment: checkout repos, setup SSH, install toolchains'

inputs:
  ref:
    description: 'Git reference to build'
    required: true
  is_release:
    description: 'Whether this is a release build'
    required: false
    default: 'false'
  platform:
    description: 'Platform being built (macos, windows, linux)'
    required: true
  arch:
    description: 'Architecture being built (aarch64, x86_64, i686)'
    required: true
  variant:
    description: 'App variant being built (production, staging, dev)'
    required: false
    default: 'production'

  private_repo_ssh_key:
    description: 'Deploy key for Rostoc/rostoc'
    required: true

  apple_certificate:
    description: 'Base64-encoded Apple signing certificate'
    required: false
    default: ''

  apple_certificate_password:
    description: 'Password for Apple signing certificate'
    required: false
    default: ''

  apple_signing_identity:
    description: 'Apple signing identity name'
    required: false
    default: ''

  apple_team_id:
    description: 'Apple Developer Team ID'
    required: false
    default: ''

  apple_id:
    description: 'Apple ID for notarization'
    required: false
    default: ''

  apple_app_specific_password:
    description: 'App-specific password for Apple ID'
    required: false
    default: ''

outputs:
  pnpm_store_path:
    description: 'Path to pnpm store'
    value: ${{ steps.pnpm-store.outputs.STORE_PATH }}
  metrics_report_path:
    description: 'Path to the build metrics report in the workspace'
    value: ${{ steps.metrics-report.outputs.path }}
  metrics_report_artifact_name:
    description: 'Artifact name for the build metrics report'
    value: ${{ steps.metrics-report.outputs.artifact_name }}
  version:
    description: 'Extracted version from tauri.conf.json'
    value: ${{ steps.extract_version.outputs.version }}
  release_version:
    description: 'Release version (if is_release)'
    value: ${{ env.RELEASE_VERSION }}

runs:
  using: 'composite'
  steps:
    - name: Checkout updates repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup SSH agent for private repo
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.private_repo_ssh_key }}

    - name: Add GitHub to known_hosts
      shell: bash
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Checkout private repo (read-only)
      uses: actions/checkout@v4
      with:
        repository: Rostoc/rostoc
        ref: ${{ inputs.ref }}
        ssh-key: ${{ inputs.private_repo_ssh_key }}
        path: private-src
        fetch-depth: 0

    - name: Initialize build metrics report
      id: metrics-report
      working-directory: private-src
      shell: bash
      run: |
        set -euo pipefail
        bash ../scripts/ci/build_metrics.sh init-report . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}"
        REPORT_FILE_NAME=$(bash ../scripts/ci/build_metrics.sh report-file-name "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}")
        REPORT_ARTIFACT_NAME=$(bash ../scripts/ci/build_metrics.sh report-artifact-name "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}")
        {
          echo "path=private-src/$REPORT_FILE_NAME"
          echo "artifact_name=$REPORT_ARTIFACT_NAME"
        } >> "$GITHUB_OUTPUT"

    - name: Force pull latest commit from private repo
      working-directory: private-src
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Force pulling latest from ${{ inputs.ref }}"
        git fetch origin "${{ inputs.ref }}"
        git reset --hard FETCH_HEAD
        CURRENT_SHA=$(git rev-parse HEAD)
        echo "::notice::Building at commit $CURRENT_SHA"
        echo "::endgroup::"

    - name: Debug Cargo.toml content
      working-directory: private-src
      shell: bash
      run: |
        echo "::group::Cargo.toml content (first 10 lines)"
        head -10 src-tauri/Cargo.toml || echo "File not found"
        echo "::endgroup::"
        echo "::group::Full path check"
        ls -la src-tauri/Cargo.toml || echo "File not found"
        pwd
        ls -la src-tauri/ || echo "Directory not found"
        echo "::endgroup::"

    - name: Capture release version
      if: ${{ inputs.is_release == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        REF="${{ inputs.ref }}"
        VERSION=${REF#v}
        if [[ -z "$VERSION" ]]; then
          echo "::error::Unable to derive release version from ref '$REF'" >&2
          exit 1
        fi
        echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python 3.11 (Windows x64)
      if: ${{ inputs.platform == 'windows' && inputs.arch == 'x86_64' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'

    - name: Setup Python 3.11 (Windows x86)
      if: ${{ inputs.platform == 'windows' && inputs.arch == 'i686' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x86'

    - name: Setup Python 3.11 (macOS/Linux)
      if: ${{ inputs.platform != 'windows' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Enable Corepack (pnpm)
      shell: bash
      run: corepack enable

    - name: Derive pnpm store path
      id: pnpm-store
      shell: bash
      run: |
        set -euo pipefail
        cd private-src
        echo "[INFO] pnpm version: $(pnpm --version || true)" >&2
        STORE_PATH=$(pnpm store path 2>/dev/null | tr -d '\r' || true)
        if [ -z "${STORE_PATH}" ]; then
          echo "[WARN] pnpm store path empty; falling back to default ~/.pnpm-store" >&2
          STORE_PATH="$HOME/.pnpm-store"
        fi
        mkdir -p "$STORE_PATH" || true
        echo "Using STORE_PATH=$STORE_PATH" >&2
        echo "STORE_PATH=$STORE_PATH" >> "$GITHUB_OUTPUT"

    - name: Compute dependency hashes
      id: dependency-hashes
      shell: bash
      run: scripts/ci/hash_lockfiles.sh private-src

    - name: Cache pnpm store
      id: pnpm-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: pnpm-${{ runner.os }}-${{ steps.dependency-hashes.outputs.pnpm }}
        restore-keys: pnpm-${{ runner.os }}-

    - name: Install uv (Python package manager)
      working-directory: private-src
      shell: bash
      run: |
        set -euo pipefail
        curl -LsSf https://astral.sh/uv/install.sh | sh
        UV_DIR="$HOME/.local/bin"
        echo "UV_BIN=$UV_DIR" >> "$GITHUB_ENV"
        echo "$UV_DIR" >> "$GITHUB_PATH"
        # Make uv immediately available in this step
        PATH="$UV_DIR:$PATH"
        if command -v cygpath >/dev/null 2>&1; then
          WIN_UV_DIR=$(cygpath -w "$UV_DIR")
          echo "$WIN_UV_DIR" >> "$GITHUB_PATH"
        fi
        uv --version

    - name: Cache Python wheels
      id: python-wheel-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/Library/Caches/pip
          ~/.cache/uv
          ~/Library/Caches/uv
        key: python-wheel-${{ runner.os }}-${{ steps.dependency-hashes.outputs.uv }}
        restore-keys: |
          python-wheel-${{ runner.os }}-

    - name: '[macOS] Install Apple signing certificate'
      if: ${{ inputs.platform == 'macos' }}
      working-directory: private-src
      shell: bash
      env:
        APPLE_CERTIFICATE: ${{ inputs.apple_certificate }}
        APPLE_CERTIFICATE_PASSWORD: ${{ inputs.apple_certificate_password }}
        APPLE_SIGNING_IDENTITY: ${{ inputs.apple_signing_identity }}
        APPLE_TEAM_ID: ${{ inputs.apple_team_id }}
        APPLE_ID: ${{ inputs.apple_id }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ inputs.apple_app_specific_password }}
      run: |
        set -euo pipefail
        scripts/macos/install_signing_certificate.sh

    - name: '[macOS] Debug signing keychain state'
      if: ${{ inputs.platform == 'macos' }}
      working-directory: private-src
      shell: bash
      env:
        APPLE_SIGNING_IDENTITY: ${{ inputs.apple_signing_identity }}
      run: |
        set -euo pipefail
        echo "[DEBUG] Listing configured keychains" >&2
        security list-keychains || true
        echo "[DEBUG] Available signing identities" >&2
        security find-identity -v -p codesigning || true
        if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
          echo "[DEBUG] Matching certificate summary for ${APPLE_SIGNING_IDENTITY}" >&2
          security find-certificate -Z -a -c "$APPLE_SIGNING_IDENTITY" 2>/dev/null | grep -E 'SHA-1|SHA-256|"' || true
        else
          echo "[DEBUG] APPLE_SIGNING_IDENTITY not provided" >&2
        fi

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Persist Cargo bin path
      shell: bash
      run: |
        set -euo pipefail
        CARGO_BIN=$(dirname "$(command -v cargo)")
        echo "$CARGO_BIN" >> "$GITHUB_PATH"
        if command -v cygpath >/dev/null 2>&1; then
          echo "$(cygpath -w "$CARGO_BIN")" >> "$GITHUB_PATH"
        fi

    - name: Debug Rust cache configuration
      if: ${{ inputs.platform != 'windows' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/inspect_rust_cache.sh pre

    - name: Compute Rust cache key
      id: rust-cache-key
      shell: bash
      run: |
        set -euo pipefail
        cache_key="${{ inputs.platform }}-${{ inputs.arch }}-${{ inputs.variant }}"
        if [[ "${{ inputs.platform }}" == "windows" ]]; then
          # Rotate the Windows namespace for the workspace-local CARGO_HOME probe.
          cache_key="${cache_key}-v3"
        fi
        echo "key=$cache_key" >> "$GITHUB_OUTPUT"

    - name: Configure Windows Cargo home
      if: ${{ inputs.platform == 'windows' }}
      id: windows-cargo-home
      shell: bash
      run: |
        set -euo pipefail

        cargo_home_posix="$GITHUB_WORKSPACE/.cargo-ci"
        mkdir -p "$cargo_home_posix/registry" "$cargo_home_posix/git"

        cargo_home_windows=$(cygpath -w "$cargo_home_posix")
        registry_windows=$(cygpath -w "$cargo_home_posix/registry")
        git_windows=$(cygpath -w "$cargo_home_posix/git")

        echo "CARGO_HOME=$cargo_home_windows" >> "$GITHUB_ENV"

        {
          echo "cargo_home=$cargo_home_windows"
          echo "registry=$registry_windows"
          echo "git=$git_windows"
        } >> "$GITHUB_OUTPUT"

    - name: Compute Windows Cargo cache inputs
      if: ${{ inputs.platform == 'windows' }}
      id: windows-cargo-cache
      shell: bash
      run: |
        set -euo pipefail

        hash_stream() {
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 | awk '{print $1}'
          elif command -v sha256sum >/dev/null 2>&1; then
            sha256sum | awk '{print $1}'
          else
            openssl dgst -sha256 | awk '{print $NF}'
          fi
        }

        files=("private-src/src-tauri/Cargo.toml")
        for candidate in \
          "private-src/src-tauri/Cargo.lock" \
          "private-src/rust-toolchain.toml" \
          "private-src/rust-toolchain" \
          "private-src/src-tauri/rust-toolchain.toml" \
          "private-src/src-tauri/rust-toolchain"; do
          if [[ -f "$candidate" ]]; then
            files+=("$candidate")
          fi
        done

        combined_hash=$(
          {
            for file in "${files[@]}"; do
              printf '%s\n' "$file"
              cat "$file"
              printf '\n'
            done
          } | hash_stream
        )

        {
          echo "registry=${{ steps.windows-cargo-home.outputs.registry }}"
          echo "git=${{ steps.windows-cargo-home.outputs.git }}"
          echo "key=windows-cargo-${{ steps.rust-cache-key.outputs.key }}-$combined_hash"
        } >> "$GITHUB_OUTPUT"

    - name: Debug Windows cache lookup inputs
      if: ${{ inputs.platform == 'windows' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        EXPECTED_KEY: ${{ steps.windows-cargo-cache.outputs.key }}
        RESTORE_PREFIX: windows-cargo-${{ steps.rust-cache-key.outputs.key }}-
        WINDOWS_CARGO_HOME: ${{ steps.windows-cargo-home.outputs.cargo_home }}
        CACHE_REGISTRY: ${{ steps.windows-cargo-cache.outputs.registry }}
        CACHE_GIT: ${{ steps.windows-cargo-cache.outputs.git }}
      run: bash scripts/ci/debug_windows_cache_lookup.sh

    - name: Lookup Windows Cargo cache
      if: ${{ inputs.platform == 'windows' }}
      id: windows-cargo-lookup
      uses: actions/cache/restore@v4
      with:
        path: |
          ${{ steps.windows-cargo-cache.outputs.registry }}
          ${{ steps.windows-cargo-cache.outputs.git }}
        key: ${{ steps.windows-cargo-cache.outputs.key }}
        restore-keys: |
          windows-cargo-${{ steps.rust-cache-key.outputs.key }}-
        lookup-only: true

    - name: Report Windows Cargo lookup-only result
      if: ${{ inputs.platform == 'windows' }}
      shell: bash
      env:
        WINDOWS_CARGO_LOOKUP_HIT: ${{ steps.windows-cargo-lookup.outputs.cache-hit || 'false' }}
        WINDOWS_CARGO_LOOKUP_PRIMARY_KEY: ${{ steps.windows-cargo-lookup.outputs.cache-primary-key || '' }}
        WINDOWS_CARGO_LOOKUP_MATCHED_KEY: ${{ steps.windows-cargo-lookup.outputs.cache-matched-key || '' }}
      run: |
        echo "::group::Windows Cargo lookup-only result"
        echo "[INFO] lookup-hit=$WINDOWS_CARGO_LOOKUP_HIT"
        echo "[INFO] lookup-primary-key=$WINDOWS_CARGO_LOOKUP_PRIMARY_KEY"
        echo "[INFO] lookup-matched-key=$WINDOWS_CARGO_LOOKUP_MATCHED_KEY"
        echo "::endgroup::"

    - name: Cache Windows Cargo dependencies
      if: ${{ inputs.platform == 'windows' }}
      id: windows-cargo-restore
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.windows-cargo-cache.outputs.registry }}
          ${{ steps.windows-cargo-cache.outputs.git }}
        key: ${{ steps.windows-cargo-cache.outputs.key }}
        restore-keys: |
          windows-cargo-${{ steps.rust-cache-key.outputs.key }}-

    - name: Cache Rust dependencies and build artifacts
      if: ${{ inputs.platform != 'windows' }}
      id: rust-cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          private-src/src-tauri -> ../target
        key: ${{ steps.rust-cache-key.outputs.key }}
        # Removed shared-key to let cache auto-invalidate on Cargo.toml changes
        # Each platform will have its own cache based on Cargo.toml+Cargo.lock
        save-if: ${{ github.ref == 'refs/heads/main' }}

    - name: Report Rust cache restore result
      if: ${{ inputs.platform != 'windows' }}
      working-directory: private-src
      shell: bash
      env:
        RUST_CACHE_HIT: ${{ steps.rust-cache.outputs.cache-hit || 'false' }}
      run: bash ../scripts/ci/inspect_rust_cache.sh post . "$RUST_CACHE_HIT"

    - name: Report Windows Cargo cache restore result
      if: ${{ inputs.platform == 'windows' }}
      shell: bash
      env:
        WINDOWS_CARGO_CACHE_HIT: ${{ steps.windows-cargo-restore.outputs.cache-hit || 'false' }}
        WINDOWS_CARGO_HOME: ${{ steps.windows-cargo-home.outputs.cargo_home }}
        WINDOWS_CARGO_REGISTRY: ${{ steps.windows-cargo-cache.outputs.registry }}
        WINDOWS_CARGO_GIT: ${{ steps.windows-cargo-cache.outputs.git }}
      run: |
        echo "::group::Windows Cargo cache restore result"
        echo "[INFO] cache-hit=$WINDOWS_CARGO_CACHE_HIT"
        echo "[INFO] cargo-home=$WINDOWS_CARGO_HOME"
        echo "[INFO] registry=$WINDOWS_CARGO_REGISTRY"
        echo "[INFO] git=$WINDOWS_CARGO_GIT"
        echo "::endgroup::"

    - name: Write cache metrics report
      if: always()
      working-directory: private-src
      shell: bash
      env:
        PNPM_CACHE_HIT: ${{ steps.pnpm-cache.outputs.cache-hit || 'false' }}
        PNPM_STORE_PATH: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        PYTHON_CACHE_HIT: ${{ steps.python-wheel-cache.outputs.cache-hit || 'false' }}
        RUST_CACHE_HIT: ${{ steps.rust-cache.outputs.cache-hit || 'false' }}
        RUST_TARGET_DIR: target
        WINDOWS_CARGO_LOOKUP_HIT: ${{ steps.windows-cargo-lookup.outputs.cache-hit || '' }}
        WINDOWS_CARGO_LOOKUP_PRIMARY_KEY: ${{ steps.windows-cargo-lookup.outputs.cache-primary-key || '' }}
        WINDOWS_CARGO_LOOKUP_MATCHED_KEY: ${{ steps.windows-cargo-lookup.outputs.cache-matched-key || '' }}
        WINDOWS_CARGO_CACHE_HIT: ${{ steps.windows-cargo-restore.outputs.cache-hit || '' }}
        WINDOWS_CARGO_HOME: ${{ steps.windows-cargo-home.outputs.cargo_home || '' }}
        WINDOWS_CARGO_REGISTRY: ${{ steps.windows-cargo-cache.outputs.registry || '' }}
        WINDOWS_CARGO_GIT: ${{ steps.windows-cargo-cache.outputs.git || '' }}
      run: bash ../scripts/ci/build_metrics.sh append-cache-report . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}"

    - name: Extract version
      id: extract_version
      working-directory: private-src
      shell: bash
      run: |
        set -euo pipefail
        VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "[INFO] Extracted version: $VERSION"
