name: 'Build Compile (Download Python, Build, Stage)'
description: 'Download Python runtime, install JS deps, stamp version, compile application'

inputs:
  platform:
    description: 'Platform being built (macos, windows, linux)'
    required: true
  arch:
    description: 'Architecture being built (aarch64, x86_64, i686)'
    required: true
  variant:
    description: 'Build variant (production, staging, dev)'
    required: true
  is_release:
    description: 'Whether this is a release build'
    required: false
    default: 'false'
  apple_signing_identity:
    description: 'Apple signing identity (macOS signing)'
    required: false
  apple_team_id:
    description: 'Apple Team ID (macOS signing)'
    required: false
  apple_id:
    description: 'Apple ID (notarytool)'
    required: false
  apple_app_specific_password:
    description: 'App-specific password for Apple ID (notarytool)'
    required: false
  tauri_signing_private_key:
    description: 'Tauri updater signing key'
    required: false
  tauri_signing_private_key_password:
    description: 'Password for the Tauri updater signing key'
    required: false

outputs:
  build_command:
    description: 'Build command used'
    value: ${{ steps.platform_config.outputs.build_command }}
  target:
    description: 'Rust target triple'
    value: ${{ steps.platform_config.outputs.target }}

runs:
  using: 'composite'
  steps:
    - name: Initialize platform-specific config
      id: platform_config
      shell: bash
      run: bash scripts/ci/run_build_compile.sh init-platform-config "${{ inputs.platform }}" "${{ inputs.arch }}"

    - name: '[macOS Intel] Confirm runner architecture'
      if: ${{ inputs.arch == 'x86_64' && inputs.platform == 'macos' }}
      shell: bash
      run: |
        RUNNER_ARCH=$(uname -m)
        if [ "$RUNNER_ARCH" != "x86_64" ]; then
          echo "::warning::Runner reports architecture $RUNNER_ARCH but matrix specifies x86_64"
        fi
        echo "[INFO] macOS runner architecture: $RUNNER_ARCH"
        uname -a

    - name: '[macOS Intel] Clear stale pyembed (force x86_64 download)'
      if: ${{ inputs.arch == 'x86_64' && inputs.platform == 'macos' }}
      working-directory: private-src
      shell: bash
      run: |
        set -euo pipefail
        if [ -d src-tauri/pyembed ]; then
          echo "[INFO] Removing existing src-tauri/pyembed to avoid arm64 leftovers"
          rm -rf src-tauri/pyembed
        fi

    - name: '[Windows x64] Clear stale pyembed (force x86_64 download)'
      if: ${{ inputs.arch == 'x86_64' && inputs.platform == 'windows' }}
      working-directory: private-src
      shell: bash
      run: |
        set -euo pipefail
        if [ -d src-tauri/pyembed ]; then
          echo "[INFO] Removing existing src-tauri/pyembed to avoid i686 leftovers"
          rm -rf src-tauri/pyembed
        fi

    - name: '[Windows x86] Verify cross-compile capability'
      if: ${{ inputs.arch == 'i686' && inputs.platform == 'windows' }}
      shell: bash
      run: |
        echo "[INFO] Windows x86 (32-bit) build via MSVC cross-compile on x64 runner"
        rustup target add i686-pc-windows-msvc
        echo "✅ i686-pc-windows-msvc target installed"
        echo "CARGO_BUILD_TARGET=i686-pc-windows-msvc" >> "$GITHUB_ENV"
        echo "✅ CARGO_BUILD_TARGET environment variable set for automatic cross-compilation"

    - name: '[Windows x86] Configure MSVC for 32-bit compilation'
      if: ${{ inputs.arch == 'i686' && inputs.platform == 'windows' }}
      uses: egor-tensin/vs-shell@v2
      with:
        arch: x86

    - name: '[Windows] Remove Git usr/bin from PATH to prevent link.exe conflict'
      if: ${{ inputs.platform == 'windows' }}
      shell: bash
      run: bash scripts/ci/run_build_compile.sh remove-windows-git-path-entries

    - name: '[Linux] Install system dependencies for AppImage'
      if: ${{ inputs.platform == 'linux' }}
      shell: bash
      run: bash scripts/ci/run_build_compile.sh install-linux-appimage-deps

    - name: Download embedded Python
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "embedded Python download" -- bash ../scripts/ci/run_build_compile.sh download-embedded-python "${{ inputs.platform }}" "${{ inputs.arch }}"

    - name: Verify embedded Python architecture
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "embedded Python arch verification" -- bash ../scripts/ci/run_build_compile.sh verify-embedded-python-arch "${{ inputs.platform }}" "${{ inputs.arch }}"

    - name: Install JS dependencies
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "pnpm install" -- pnpm install --frozen-lockfile

    - name: Stamp build version (dev builds only)
      if: env.RELEASE_VERSION == ''
      working-directory: private-src
      shell: bash
      env:
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "dev version stamping" -- scripts/ci/stamp_dev_version.sh

    - name: Set variant-specific Tauri config flag
      shell: bash
      run: bash scripts/ci/run_build_compile.sh set-tauri-config-flag "${{ inputs.platform }}"

    - name: Configure Python bytecode mode
      shell: bash
      run: bash scripts/ci/run_build_compile.sh configure-python-bytecode-mode "${{ inputs.platform }}" "${{ inputs.variant }}" "${{ inputs.is_release }}"

    - name: Capture diagnostic environment info
      if: always()
      shell: bash
      working-directory: private-src
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "diagnostic environment capture" -- bash ../scripts/ci/run_build_compile.sh capture-diagnostic-environment "${{ inputs.platform }}" "${{ inputs.arch }}"

    - name: Upload diagnostic info
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: diagnostics-${{ inputs.variant }}-${{ inputs.platform }}-${{ inputs.arch }}-${{ github.run_number }}
        path: private-src/diagnostics-*.md
        retention-days: 14
        if-no-files-found: warn

    - name: Generate build fingerprint
      shell: bash
      working-directory: private-src
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "build fingerprint generation" -- bash ../scripts/ci/run_build_compile.sh generate-build-fingerprint "${{ inputs.platform }}" "${{ inputs.arch }}"

    - name: Upload build fingerprint
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fingerprint-${{ inputs.variant }}-${{ inputs.platform }}-${{ inputs.arch }}-${{ github.run_number }}
        path: private-src/build-fingerprint.txt
        retention-days: 30
        if-no-files-found: warn

    - name: Generate Python config (before runtime staging)
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "Python config generation" -- ../scripts/ci/generate_and_verify_config.sh

    - name: '[macOS] Stage Python runtime (before Tauri build/sign)'
      if: ${{ inputs.platform == 'macos' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "runtime staging" -- ../scripts/ci/stage_and_verify_runtime.sh

    - name: '[macOS] Sign Python binaries and libraries (before Tauri build)'
      if: ${{ inputs.platform == 'macos' }}
      working-directory: private-src
      shell: bash
      env:
        APPLE_SIGNING_IDENTITY: ${{ inputs.apple_signing_identity }}
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "macOS runtime signing" -- ../scripts/ci/sign_python_runtime.sh

    - name: '[macOS] Verify generated_config.py after signing'
      if: ${{ inputs.platform == 'macos' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "macOS post-sign verification" -- ../scripts/ci/verify_config_after_signing.sh

    - name: '[Windows] Stage Python runtime (before Tauri build)'
      if: ${{ inputs.platform == 'windows' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "runtime staging" -- ../scripts/ci/stage_and_verify_runtime.sh

    - name: '[Windows] Set PYO3_PYTHON for correct embedded Python linking'
      if: ${{ inputs.platform == 'windows' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "Windows PYO3_PYTHON setup" -- bash ../scripts/ci/run_build_compile.sh set-windows-pyo3-python "${{ inputs.arch }}"

    - name: Validate version matches tag (release builds only)
      if: ${{ inputs.is_release == 'true' }}
      working-directory: private-src
      shell: bash
      env:
        GITHUB_REF: ${{ github.ref }}
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "release version validation" -- ../scripts/ci/validate_release_version.sh

    - name: Build application
      working-directory: private-src
      shell: bash
      env:
        # Variant configuration (must be set for Rust compile-time option_env! macro)
        ROSTOC_APP_VARIANT: ${{ env.ROSTOC_APP_VARIANT }}
        TAURI_SIGNING_PRIVATE_KEY: ${{ inputs.tauri_signing_private_key }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ inputs.tauri_signing_private_key_password }}
        APPLE_SIGNING_IDENTITY: ${{ inputs.apple_signing_identity }}
        APPLE_TEAM_ID: ${{ inputs.apple_team_id }}
        APPLE_ID: ${{ inputs.apple_id }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ inputs.apple_app_specific_password }}
        ENABLE_RUNTIME_CACHE: '1'
        UV_DISABLE_WORKSPACE: '1'
        UV_PROJECT_ENVIRONMENT: 'shared'
        RUST_TARGET: ${{ steps.platform_config.outputs.target }}
        CROSS_COMPILE_ARGS: ${{ steps.platform_config.outputs.cross_compile_args || '' }}
        # Linux AppImage workarounds for FUSE and linuxdeploy issues
        APPIMAGE_EXTRACT_AND_RUN: ${{ inputs.platform == 'linux' && '1' || '' }}
        NO_STRIP: ${{ inputs.platform == 'linux' && '1' || '' }}
        OUTPUT: ${{ inputs.platform == 'linux' && '2' || '' }}
        VERBOSE: ${{ inputs.platform == 'linux' && '1' || '' }}
        # Enable debug symbols for build dependencies (better error traces)
        CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: 'true'
        # PYO3_PYTHON is set by previous step for Windows, inherited for other platforms
      run: bash ../scripts/ci/build_metrics.sh run-timed-command . "${{ inputs.variant }}" "${{ inputs.platform }}" "${{ inputs.arch }}" "final Tauri build" -- ../scripts/ci/execute_build.sh "${{ inputs.platform }}" "${{ inputs.arch }}" "${{ steps.platform_config.outputs.build_command }}"
