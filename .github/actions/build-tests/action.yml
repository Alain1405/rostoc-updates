name: 'Build Tests (Smoke tests for all platforms)'
description: 'Run runtime, GUI, and Windows integration smoke tests, upload diagnostics'

inputs:
  platform:
    description: 'Platform being built (macos, windows, linux)'
    required: true
  arch:
    description: 'Architecture being built (aarch64, x86_64, i686)'
    required: true
  app_path:
    description: 'Path to app bundle (macOS only)'
    required: false
  python_path:
    description: 'Path to embedded Python (macOS only)'
    required: false
  variant:
    description: 'Build variant (production|staging|dev)'
    required: false
    default: 'production'

runs:
  using: 'composite'
  steps:
    - name: '[macOS] Runtime smoke test'
      if: ${{ inputs.platform == 'macos' && inputs.app_path != '' }}
      working-directory: private-src
      shell: bash
      env:
        APP_BUNDLE: ${{ inputs.app_path }}
        PYBIN_HINT: ${{ inputs.python_path }}
      run: bash ../scripts/ci/run_build_tests.sh mac-runtime ${{ inputs.arch }} ${{ inputs.variant }}

    - name: '[macOS] GUI smoke test (non-fatal)'
      if: ${{ inputs.platform == 'macos' }}
      working-directory: private-src
      shell: bash
      env:
        APP_BUNDLE: ${{ inputs.app_path }}
        PYBIN_HINT: ${{ inputs.python_path }}
      run: bash ../scripts/ci/run_build_tests.sh mac-gui ${{ inputs.arch }} ${{ inputs.variant }}

    - name: '[Windows x86] Runtime smoke test (cross-compile validation)'
      if: ${{ inputs.platform == 'windows' && inputs.arch == 'i686' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/run_build_tests.sh windows-runtime ${{ inputs.arch }} ${{ inputs.variant }}

    - name: '[Windows x86] Single-instance deep-link integration smoke (non-fatal)'
      if: ${{ inputs.platform == 'windows' && inputs.arch == 'i686' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/run_build_tests.sh windows-integration ${{ inputs.arch }} ${{ inputs.variant }}

    - name: '[Windows x64] Runtime smoke test'
      if: ${{ inputs.platform == 'windows' && inputs.arch == 'x86_64' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/run_build_tests.sh windows-runtime ${{ inputs.arch }} ${{ inputs.variant }}

    - name: '[Windows x64] Single-instance deep-link integration smoke'
      if: ${{ inputs.platform == 'windows' && inputs.arch == 'x86_64' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/run_build_tests.sh windows-integration ${{ inputs.arch }} ${{ inputs.variant }}

    - name: '[Linux] Runtime smoke test'
      if: ${{ inputs.platform == 'linux' }}
      working-directory: private-src
      shell: bash
      run: bash ../scripts/ci/run_build_tests.sh linux-runtime ${{ inputs.arch }} ${{ inputs.variant }}

    - name: Upload macOS smoke diagnostics
      if: ${{ inputs.platform == 'macos' && always() }}
      uses: actions/upload-artifact@v4
      with:
        name: smoke-debug-${{ inputs.variant }}-${{ inputs.platform }}-${{ inputs.arch }}
        path: |
          private-src/macos_runtime_smoke_debug.json
          private-src/macos_gui_smoke_debug.json
        if-no-files-found: warn

    - name: Upload Windows x86 smoke diagnostics
      if: ${{ inputs.platform == 'windows' && inputs.arch == 'i686' && always() }}
      uses: actions/upload-artifact@v4
      with:
        name: smoke-debug-${{ inputs.variant }}-${{ inputs.platform }}-${{ inputs.arch }}
        path: |
          private-src/windows_x86_runtime_smoke_debug.json
          private-src/windows_x86_integration_smoke_debug.json
        if-no-files-found: warn

    - name: Upload Windows x64 smoke diagnostics
      if: ${{ inputs.platform == 'windows' && inputs.arch == 'x86_64' && always() }}
      uses: actions/upload-artifact@v4
      with:
        name: smoke-debug-${{ inputs.variant }}-${{ inputs.platform }}-${{ inputs.arch }}
        path: |
          private-src/windows_x64_runtime_smoke_debug.json
          private-src/windows_x64_integration_smoke_debug.json
        if-no-files-found: warn

    - name: Upload Linux smoke diagnostics
      if: ${{ inputs.platform == 'linux' && always() }}
      uses: actions/upload-artifact@v4
      with:
        name: smoke-debug-${{ inputs.variant }}-${{ inputs.platform }}-${{ inputs.arch }}
        path: |
          private-src/linux_runtime_smoke_debug.json
        if-no-files-found: warn

    - name: Upload build logs (post-tests)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-post-tests-${{ inputs.variant }}-${{ inputs.platform }}-${{ inputs.arch }}
        path: |
          private-src/build-*.log
        if-no-files-found: warn
